<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - La Scène Parisienne</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-container {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }
        .login-container h1 { color: #fff; margin-bottom: 30px; font-size: 24px; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px; background: #222;
            border: 1px solid #444; border-radius: 6px;
            color: #fff; font-size: 16px; box-sizing: border-box;
        }
        .input-group input:focus { outline: none; border-color: #fff; }
        .login-btn {
            width: 100%; padding: 14px; background: #fff; color: #000;
            border: none; border-radius: 6px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .login-btn:hover { background: #e6e6e6; transform: translateY(-2px); }
        .error-msg { color: #ff4d4d; margin-top: 15px; font-size: 14px; display: none; }
        .back-home { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 14px; }
        .back-home:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ADMINISTRATION</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="text" id="username" placeholder="Email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">LOG IN</button>
            <div id="errorMsg" class="error-msg">Incorrect email or password.</div>
        </form>
        <a href="index.html" class="back-home">← Back to site</a>
    </div>

    <script>
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('username').value.trim();
            const pass  = document.getElementById('password').value;
            const btn   = e.target.querySelector('button');
            btn.textContent = 'Connexion...';
            btn.disabled = true;

            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.textContent = 'LOG IN';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Server unreachable. Run start-server.bat first.';
                document.getElementById('errorMsg').style.display = 'block';
                btn.textContent = 'LOG IN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
