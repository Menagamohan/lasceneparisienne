<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Slider</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/booking.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left img {
            width: 70%;
            border-radius: 10px;
        }

        .right {
            width: 60%;
            padding: 50px;
        }

        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .details p {
            margin: 5px 0;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }

        /* arrows */

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
        }

        .left-arrow {
            left: 10px;
        }

        .right-arrow {
            right: 10px;
        }

        /* RESPONSIVE */

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                padding-top: 40px;
            }

            .left img {
                width: 50%;
            }

            .right {
                padding: 30px;
                text-align: center;
            }

            .details {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .left img {
                width: 80%;
            }

            .title {
                font-size: 28px;
            }

            .details {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

    <!-- BOOKING OVERLAY -->
    <div class="booking-overlay" id="bookingOverlay">
        <div class="booking-header">
            <button class="booking-back" onclick="bookingBack()">← Retour</button>
            <button class="booking-close" onclick="closeBooking()">✕</button>
        </div>

        <!-- Step 1: Show Details -->
        <div class="booking-content" id="bookingStep1">
            <div class="booking-poster">
                <img id="bookingImage" src="" alt="Show poster">
            </div>
            <div class="booking-details">
                <h1 id="bookingTitle"></h1>
                <div class="booking-info">
                    <div class="booking-info-row"><span class="label">Dates</span><span class="value"
                            id="bookingDates"></span></div>
                    <div class="booking-info-row"><span class="label">Horaires</span><span class="value"
                            id="bookingHoraires"></span></div>
                    <div class="booking-info-row"><span class="label">Salle</span><span class="value"
                            id="bookingSalle"></span></div>
                    <div class="booking-info-row"><span class="label">Tarif</span><span class="value"
                            id="bookingTarif"></span></div>
                    <div class="booking-info-row"><span class="label">Durée</span><span class="value"
                            id="bookingDuree"></span></div>
                </div>
                <div class="booking-desc" id="bookingDesc"></div>
                <button class="btn-reserver" onclick="showCalendarStep()">RÉSERVER</button>
            </div>
        </div>

        <!-- Step 2: Calendar & Time Selection -->
        <div class="booking-calendar-step" id="bookingStep2">

            <div class="calendar-nav">

            <div class="calendar-grid" id="calendarGrid"></div>

                <div class="time-slots-grid" id="timeSlotsGrid"></div>
            </div>
            <button class="btn-confirm" id="btnConfirm" onclick="confirmBooking()">CONFIRMER LA RÉSERVATION</button>
        </div>

        <!-- Step 3: Confirmation -->
        <div class="booking-confirmed" id="bookingStep3">
            <div class="check-icon">✓</div>
            <h2>Réservation Confirmée !</h2>
            <p id="confirmShowTitle"></p>
            <p id="confirmDateTime"></p>
            <p id="confirmSalle"></p>
            <p id="confirmTarif"></p>
            <button class="btn-done" onclick="closeBooking()">RETOUR AUX SPECTACLES</button>
        </div>

        let programs = [];
        const urlParams = new URLSearchParams(window.location.search);
        let current = parseInt(urlParams.get("slide")) || 0;

        async function loadAllPrograms() {
            try {
                const querySnapshot = await db.collection("shows").orderBy("createdAt", "desc").get();
                const firestoreShows = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                programs = [...staticPrograms, ...firestoreShows];
                
                if (current >= programs.length) current = 0;
                loadSlide();
            } catch (error) {
                console.error("Error loading programs:", error);
                programs = staticPrograms;
                loadSlide();
            }
        }

        loadAllPrograms();

        function loadSlide() {
            if (programs.length === 0) return;
            const p = programs[current];
            
            document.getElementById("programTitle").innerText = p.title;
            document.getElementById("programImage").src = p.image;
            document.getElementById("Dates").innerText = p.Dates || p.date || "-";
            document.getElementById("Horaires").innerText = p.Horaires || p.time || "-";
            document.getElementById("Salle").innerText = p.Salle || "-";
            document.getElementById("Tarif").innerText = p.Tarif || p.price || "-";
            document.getElementById("Durée").innerText = p.Durée || p.duration || "-";

            // ✅ Use innerHTML for <br>
            document.getElementById("desc").innerHTML = p.desc || "";
        }

        /* NAVIGATION */
        function nextSlide() {
            current = (current + 1) % programs.length;
            loadSlide();
        }

        function prevSlide() {
            current = (current - 1 + programs.length) % programs.length;
            loadSlide();
        }

        /* INIT */
        loadSlide();
    </script>
    <script src="assets/js/booking.js"></script>

</body>
